
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title — shows in browser tab and Google search results -->
    <title>Prathik Kumar MP — Product Manager · Bengaluru</title>

    <!-- Meta description — shows under your link in Google results -->
    <meta
      name="description"
      content="Product Manager with 7 years across SaaS, D2C & AgriTech. Scaled Sid's Farm to ₹575 Cr valuation. Strategy, design, and execution — all in one PM."
    />
    <meta name="author" content="Prathik Kumar MP" />

    <!-- Favicon — replace /favicon.png with your actual favicon file -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Open Graph tags — controls how your link looks when shared on LinkedIn, WhatsApp, Twitter -->
    <meta property="og:title" content="Prathik Kumar MP — Product Manager" />
    <meta
      property="og:description"
      content="7 years across SaaS, D2C & AgriTech. Strategy. Design. Execution. All in one PM."
    />
    <meta property="og:type" content="website" />
    <!-- UPDATE this URL once you have your domain -->
    <meta property="og:url" content="https://prathikkumarmp.com" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Prathik Kumar MP — Product Manager" />
    <meta
      name="twitter:description"
      content="7 years across SaaS, D2C & AgriTech. Strategy. Design. Execution."
    />

    <!-- Canonical URL — tells Google this is the main version of your site -->
    <!-- UPDATE this URL once you have your domain -->
    <link rel="canonical" href="https://prathikkumarmp.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
